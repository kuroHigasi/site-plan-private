name: Generate Markdown and MySQL from DBML

on:
  push:
    branches:
      - main
    paths:
      - '01_DOCS/04_API設計/02_詳細設計/テーブル定義/**/*.dbml' # このフォルダ内のDBMLが変更された時だけ実行
  workflow_dispatch: # 手動実行用

permissions:
  contents: write # 生成されたファイルをプッシュするために必要

concurrency:
  group: dbml-gen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-artifacts:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.jsのセットアップ
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. @dbml/cli をグローバルインストール
      - name: Install DBML CLI
        run: npm install -g @dbml/cli

      # 4. DBML CLIを用いた生成処理（全DBMLファイルをループ処理）
      - name: Generate Markdown and MySQL Script
        run: |
          # 📂 出力先フォルダの定義と作成（日本語・特殊文字対応）
          MD_DIR="01_DOCS/wiki/05_DB設計"
          SQL_DIR="02_OUTPUT/QUERY"
          mkdir -p "$MD_DIR"
          mkdir -p "$SQL_DIR"

          # 📥 入力元フォルダの定義
          INPUT_DIR="01_DOCS/04_API設計/02_詳細設計/テーブル定義"

          # 指定された入力元フォルダ内の .dbml ファイルが存在するか確認
          DBML_COUNT=$(find "$INPUT_DIR" -name "*.dbml" | wc -l)
          if [ "$DBML_COUNT" -eq 0 ]; then
            echo "Error: No .dbml file found in '$INPUT_DIR'."
            exit 1
          fi

          # 全 .dbml ファイルをループして変換
          find "$INPUT_DIR" -name "*.dbml" | while read -r DBML_FILE; do
            # パスからファイル名（拡張子なし）を抽出 (例: changelogs.dbml -> changelogs)
            BASE_NAME=$(basename "$DBML_FILE" .dbml)
            echo "Processing: $DBML_FILE (Base name: $BASE_NAME)"

            # 📄 A. Markdown定義書を生成
            dbml md "$DBML_FILE" -o "${MD_DIR}/${BASE_NAME}.md"

            # 🐬 B. MySQL用SQLを生成
            dbml mysql "$DBML_FILE" -o "${SQL_DIR}/${BASE_NAME}.sql"
          done

      # 5. 変更があれば自動コミットしてPush
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 成果物をGitに追加
          git add "01_DOCS/wiki/05_DB設計/*.md" "02_OUTPUT/QUERY/*.sql"
          
          # [skip ci] で無限ループを防止
          git commit -m "docs/db: [skip ci] DBMLからMarkdownとMySQLを自動生成" || echo "No changes to commit"
          git push origin main